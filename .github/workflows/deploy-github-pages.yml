# Builds this Astro site at the repository root and deploys dist/ to GitHub Pages.
# Live site: https://www.openattitude.org
#
# Repository: Settings → Pages → Source: GitHub Actions
# Repository: Settings → Pages → Custom domain: www.openattitude.org
# DNS: CNAME record www → <user-or-org>.github.io (see GitHub Pages custom domain docs)
# public/CNAME includes www.openattitude.org for the published artifact.
#
# For a project site at https://<org>.github.io/<repo>/ only, set base in astro.config.mjs.

name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://www.openattitude.org
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
